name: Main App CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'ml-services/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'ml-services/**'
      - 'docs/**'
      - '*.md'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm turbo run lint

      - name: Run TypeScript check
        run: pnpm turbo run build --filter=@inkra/web -- --no-emit 2>/dev/null || pnpm --filter @inkra/web exec tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm turbo run test --filter=@inkra/web -- --coverage
        env:
          CI: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/web/coverage/lcov.info
          flags: unit-tests

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inkra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @inkra/web exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm turbo run db:generate --filter=@inkra/web

      - name: Run database migrations
        run: pnpm --filter @inkra/web exec prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inkra_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inkra_test

      - name: Build application
        run: pnpm turbo run build --filter=@inkra/web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inkra_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inkra_test
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run E2E tests
        run: pnpm turbo run test:e2e --filter=@inkra/web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inkra_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/inkra_test
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MFA_ENCRYPTION_KEY: test-mfa-encryption-key-32chars00
          TRUSTED_DEVICE_SECRET: test-trusted-device-secret-32ch

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm turbo run db:generate --filter=@inkra/web

      - name: Build all apps
        run: pnpm turbo run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/inkra
          DIRECT_URL: postgresql://user:pass@localhost:5432/inkra
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: https://app.oninkra.com

  deploy-marketing-preview:
    name: Deploy Marketing Preview
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing site
        run: pnpm turbo run build --filter=@inkra/marketing

      - name: Deploy Marketing to Preview
        id: deploy-marketing
        run: |
          cd apps/marketing
          URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Marketing preview deployed: ${{ steps.deploy-marketing.outputs.url }}`
            })

  deploy-marketing-production:
    name: Deploy Marketing Production
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing site
        run: pnpm turbo run build --filter=@inkra/marketing

      - name: Deploy Marketing to Production
        run: |
          cd apps/marketing
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}

  deploy-app-production:
    name: Deploy App Production
    runs-on: ubuntu-latest
    needs: [lint, build, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Railway auto-deploys from Dockerfile on push to main
      # This job just tracks that the deployment should happen
      - name: Trigger Railway deployment
        run: |
          echo "Railway will auto-deploy from Dockerfile"
          echo "Web app deployed to app.oninkra.com"

  migrate-production:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    needs: [deploy-app-production]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm turbo run db:generate --filter=@inkra/web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Get database credentials
        id: db-creds
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id inkra/prod/rds/master-credentials \
            --query SecretString \
            --output text)
          echo "::add-mask::$(echo $SECRET | jq -r '.password')"
          echo "DATABASE_URL=postgresql://$(echo $SECRET | jq -r '.username'):$(echo $SECRET | jq -r '.password')@$(echo $SECRET | jq -r '.host'):5432/$(echo $SECRET | jq -r '.dbname')?sslmode=require" >> $GITHUB_OUTPUT

      - name: Run migrations
        run: pnpm --filter @inkra/web exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.db-creds.outputs.DATABASE_URL }}
          DIRECT_URL: ${{ steps.db-creds.outputs.DATABASE_URL }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-marketing-production, deploy-app-production, migrate-production]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Notify on success
        if: needs.deploy-app-production.result == 'success' && needs.deploy-marketing-production.result == 'success'
        run: |
          echo "Deployment successful! 🎉"
          echo "Marketing: https://oninkra.com"
          echo "App: https://app.oninkra.com"

      - name: Notify on failure
        if: needs.deploy-app-production.result == 'failure' || needs.deploy-marketing-production.result == 'failure'
        run: |
          echo "Deployment failed! ❌"
          exit 1
