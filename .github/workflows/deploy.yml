name: Build and Deploy to ECS Express Mode

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC authentication with AWS - no stored credentials
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: inkra-web
  ECS_SERVICE: inkra-prod
  ECS_CLUSTER: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 7GB RAM available on ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication - no AWS keys stored in GitHub
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Fetch build-time parameters from Parameter Store (free tier)
      - name: Fetch build parameters from Parameter Store
        id: params
        run: |
          # Fetch build-time parameters (NEXT_PUBLIC_* vars needed at build time)
          PARAMS=$(aws ssm get-parameters-by-path \
            --path "/inkra/build/" \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text)

          # Parse and export each parameter
          while IFS=$'\t' read -r name value; do
            key=$(basename "$name")
            echo "BUILD_${key}=${value}" >> $GITHUB_OUTPUT
            # Mask sensitive values in logs
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done <<< "$PARAMS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          execution-role-arn: arn:aws:iam::318928518060:role/InkraECSTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::318928518060:role/InkraECSInfrastructureRole
          cpu: 1024
          memory: 2048
          container-port: 3000
          health-check-path: /api/health
          min-task-count: 1
          max-task-count: 10
          auto-scaling-metric: AVERAGE_CPU
          auto-scaling-target-value: 70
          environment-variables: |
            [
              {"name": "NODE_ENV", "value": "production"},
              {"name": "PORT", "value": "3000"},
              {"name": "HOSTNAME", "value": "0.0.0.0"},
              {"name": "AWS_REGION", "value": "us-east-2"},
              {"name": "AWS_S3_BUCKET", "value": "inkra-uploads-prod"},
              {"name": "AWS_S3_BUCKET_AUDIT_LOGS", "value": "inkra-audit-logs-prod"},
              {"name": "AWS_S3_BUCKET_BACKUPS", "value": "inkra-backups-prod"},
              {"name": "AWS_S3_BUCKET_EXPORTS", "value": "inkra-exports-prod"},
              {"name": "AWS_S3_BUCKET_RECORDINGS", "value": "inkra-recordings-prod"},
              {"name": "EMAIL_ENABLED", "value": "true"},
              {"name": "MARKETING_URL", "value": "https://oninkra.com"},
              {"name": "NEXT_PUBLIC_APP_URL", "value": "https://app.oninkra.com"}
            ]
          secrets: |
            [
              {"name": "DATABASE_URL", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:DATABASE_URL::"},
              {"name": "DIRECT_URL", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:DIRECT_URL::"},
              {"name": "SUPABASE_SERVICE_ROLE_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:SUPABASE_SERVICE_ROLE_KEY::"},
              {"name": "ANTHROPIC_API_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:ANTHROPIC_API_KEY::"},
              {"name": "DEEPGRAM_API_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:DEEPGRAM_API_KEY::"},
              {"name": "STRIPE_SECRET_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:STRIPE_SECRET_KEY::"},
              {"name": "STRIPE_WEBHOOK_SECRET", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:STRIPE_WEBHOOK_SECRET::"},
              {"name": "TWILIO_ACCOUNT_SID", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TWILIO_ACCOUNT_SID::"},
              {"name": "TWILIO_AUTH_TOKEN", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TWILIO_AUTH_TOKEN::"},
              {"name": "TWILIO_API_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TWILIO_API_KEY::"},
              {"name": "TWILIO_API_SECRET", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TWILIO_API_SECRET::"},
              {"name": "TWILIO_PHONE_NUMBER", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TWILIO_PHONE_NUMBER::"},
              {"name": "MFA_ENCRYPTION_KEY", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:MFA_ENCRYPTION_KEY::"},
              {"name": "TRUSTED_DEVICE_SECRET", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:TRUSTED_DEVICE_SECRET::"},
              {"name": "CRON_SECRET", "valueFrom": "arn:aws:secretsmanager:us-east-2:318928518060:secret:inkra/runtime-secrets:CRON_SECRET::"}
            ]
