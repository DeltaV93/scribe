name: Build and Deploy to ECS Fargate

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC authentication with AWS - no stored credentials
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: inkra-web
  ECS_SERVICE: inkra-prod
  ECS_CLUSTER: default
  TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 7GB RAM available on ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication - no AWS keys stored in GitHub
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Fetch build-time parameters from Parameter Store (free tier)
      - name: Fetch build parameters from Parameter Store
        id: params
        run: |
          # Fetch build-time parameters (NEXT_PUBLIC_* vars needed at build time)
          PARAMS=$(aws ssm get-parameters-by-path \
            --path "/inkra/build/" \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text)

          # Parse and export each parameter
          while IFS=$'\t' read -r name value; do
            key=$(basename "$name")
            echo "BUILD_${key}=${value}" >> $GITHUB_OUTPUT
            # Mask sensitive values in logs
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done <<< "$PARAMS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.params.outputs.BUILD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
