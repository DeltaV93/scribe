name: Build and Deploy to App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC authentication with AWS - no stored credentials
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: inkra-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 7GB RAM available on ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication - no AWS keys stored in GitHub
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Fetch build-time secrets from AWS Secrets Manager
      - name: Fetch build secrets from AWS Secrets Manager
        id: secrets
        run: |
          # Fetch build-time secrets (only NEXT_PUBLIC_* vars needed at build time)
          BUILD_SECRETS=$(aws secretsmanager get-secret-value \
            --secret-id inkra/build \
            --query SecretString \
            --output text)

          # Parse and export each secret
          echo "$BUILD_SECRETS" | jq -r 'to_entries | .[] | "BUILD_\(.key)=\(.value)"' >> $GITHUB_OUTPUT

          # Mask sensitive values in logs
          echo "$BUILD_SECRETS" | jq -r 'to_entries | .[] | .value' | while read -r value; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.secrets.outputs.BUILD_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ steps.secrets.outputs.BUILD_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.secrets.outputs.BUILD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.secrets.outputs.BUILD_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to App Runner
        run: |
          # Trigger App Runner deployment with new image
          aws apprunner start-deployment \
            --service-arn ${{ vars.APP_RUNNER_SERVICE_ARN }}

          echo "✅ Deployment triggered for commit ${{ github.sha }}"
          echo "📋 Check AWS Console for deployment status"
