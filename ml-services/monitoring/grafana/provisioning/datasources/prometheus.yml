# Prometheus datasource configuration for Grafana
# This file provisions Prometheus as a datasource automatically on Grafana startup

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.45.0"
      cacheLevel: High
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m
      disableRecordingRules: false
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # CloudWatch datasource for AWS metrics (optional, requires IAM credentials)
  - name: CloudWatch
    type: cloudwatch
    uid: cloudwatch
    access: proxy
    editable: false
    jsonData:
      authType: default
      defaultRegion: us-east-1
      customMetricsNamespaces: "Inkra/MLServices"
