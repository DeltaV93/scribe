# Prometheus configuration for local development

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ml-services'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'celery-workers'
    static_configs:
      - targets: ['worker:5555']  # Flower metrics if enabled
